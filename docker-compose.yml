services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: invoiceapp-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoiceapp-api
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=InvoiceAppDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      ASPNETCORE_ENVIRONMENT: "Production"
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: "InvoiceApp"
      Jwt__Audience: "InvoiceAppClient"
      Jwt__ExpirationMinutes: "60"
      Seed__AdminUserName: ${SEED_ADMIN_USERNAME}
      Seed__AdminPassword: ${SEED_ADMIN_PASSWORD}
    ports:
      - "5000:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5000"
    container_name: invoiceapp-web
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  mssql-data: